<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心情日記本</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .mood-dot {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .mood-dot.active {
            border-color: black;
            transform: scale(1.2);
        }
    </style>
</head>

<body class="bg-gray-50 min-h-screen pb-20">

    <!-- 導覽列 -->
    <nav class="bg-indigo-600 text-white p-4 sticky top-0 z-10 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold">心情日記本</h1>
            <div class="flex gap-2">
                <button onclick="switchView('settings')" class="p-2 text-indigo-200 hover:text-white transition"><i
                        class="fas fa-cog"></i> 設定</button>
                <button onclick="switchView('list')" class="p-2"><i class="fas fa-calendar-alt"></i> 瀏覽</button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-4 max-w-2xl">

        <!-- 檢視模式：讀取日記 -->
        <section id="view-list" class="hidden">
            <div class="flex flex-col sm:flex-row gap-4 mb-4">
                <input type="month" id="filter-month" class="border p-2 rounded flex-1">
                <select id="filter-mood" class="border p-2 rounded flex-1">
                    <option value="">所有心情顏色</option>
                    <!-- 選項將由 JS 動態生成以套用使用者設定 -->
                </select>
            </div>
            <div id="diary-container" class="space-y-4">
                <!-- 日記列表將生成在此 -->
            </div>
            <button onclick="switchView('write')"
                class="fixed bottom-6 right-6 z-20 bg-indigo-600 text-white w-14 h-14 rounded-full shadow-lg text-2xl">＋</button>
        </section>

        <!-- 寫作模式：新增/編輯日記 -->
        <section id="view-write" class="space-y-6">
            <div class="bg-white p-4 sm:p-6 rounded-xl shadow-sm border border-gray-100">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-4">
                    <input type="date" id="diary-date"
                        class="w-full sm:w-auto text-lg font-bold border-b border-dashed focus:outline-none pb-1">
                    <div class="flex gap-2 flex-wrap" id="mood-picker">
                        <div class="mood-dot" style="background: #ffadad" data-color="#ffadad"></div>
                        <div class="mood-dot" style="background: #ffd6a5" data-color="#ffd6a5"></div>
                        <div class="mood-dot" style="background: #fdffb6" data-color="#fdffb6"></div>
                        <div class="mood-dot" style="background: #caffbf" data-color="#caffbf"></div>
                        <div class="mood-dot" style="background: #9bf6ff" data-color="#9bf6ff"></div>
                        <div class="mood-dot" style="background: #bdb2ff" data-color="#bdb2ff"></div>
                    </div>
                </div>

                <!-- 小記列表 -->
                <div id="entries-list" class="space-y-3 mb-6">
                    <!-- 條目動態插入 -->
                </div>

                <!-- 輸入區 -->
                <div class="border-t pt-4">
                    <div class="flex flex-col sm:flex-row gap-2 mb-3">
                        <button onclick="startVoice()" id="voice-btn"
                            class="bg-red-500 text-white px-4 py-2 rounded-lg flex justify-center items-center gap-2 whitespace-nowrap">
                            <i class="fas fa-microphone"></i> 錄音解析
                        </button>
                        <div class="flex flex-1 gap-2">
                            <input type="text" id="manual-time" value="" placeholder="時間點"
                                class="border px-3 py-2 rounded-lg w-24 sm:w-28 focus:ring-2 focus:ring-indigo-300 outline-none text-center">
                            <button onclick="addManualEntry()"
                                class="bg-gray-200 text-gray-800 px-4 py-2 rounded-lg flex-1 hover:bg-gray-300 transition font-medium whitespace-nowrap">手寫加入</button>
                        </div>
                    </div>
                    <textarea id="manual-input" placeholder="今天發生了什麼事？(或是按下錄音用說的...)"
                        class="w-full border p-3 rounded-lg h-24 focus:ring-2 focus:ring-indigo-300 outline-none"></textarea>
                </div>
            </div>

            <!-- 總結區 -->
            <div class="bg-indigo-50 p-4 sm:p-6 rounded-xl border border-indigo-100">
                <div class="flex justify-between items-center mb-2">
                    <h3 class="font-bold text-indigo-800">當日總結</h3>
                    <button onclick="generateSummary()"
                        class="text-sm bg-indigo-200 text-indigo-700 px-3 py-1 rounded-full hover:bg-indigo-300">
                        <i class="fas fa-magic"></i> AI 自動生成
                    </button>
                </div>
                <textarea id="daily-summary" placeholder="這一天過得如何？寫點給自己的話吧..."
                    class="w-full bg-transparent border-b border-indigo-200 focus:outline-none py-2 h-20"></textarea>
            </div>

            <button onclick="saveDiary()"
                class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold text-lg shadow-lg hover:bg-indigo-700 transition">
                儲存今日日記
            </button>
        </section>

        <!-- 設定模式：輸入 API Key -->
        <section id="view-settings" class="hidden space-y-6">
            <div class="bg-white p-4 sm:p-6 rounded-xl shadow-sm border border-gray-100">
                <h2 class="text-xl font-bold mb-4 flex items-center gap-2"><i class="fas fa-key text-indigo-500"></i>
                    API 金鑰設定</h2>
                <p class="text-gray-600 text-sm mb-4">
                    為了使用語音解析與自動總結功能，您需要填寫自己的 Google Gemini API Key。<br>
                    <span class="text-red-500 font-bold">此金鑰僅會保存在您當前裝置的瀏覽器中 (localStorage)，不會回傳至其他伺服器，因此較為安全。</span>
                </p>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">您的 Gemini API Key</label>
                        <input type="password" id="api-key-input" placeholder="AIzaSy..."
                            class="w-full border p-3 rounded-lg focus:ring-2 focus:ring-indigo-300 outline-none">
                    </div>
                    <button onclick="saveApiKey()"
                        class="w-full bg-indigo-600 text-white py-3 rounded-lg font-bold shadow hover:bg-indigo-700 transition">
                        儲存 API 金鑰設定
                    </button>
                </div>

                <!-- 設定模式：心情標籤 -->
                <div class="border-t pt-6 mt-6 border-gray-100">
                    <h2 class="text-xl font-bold mb-4 flex items-center gap-2"><i
                            class="fas fa-palette text-indigo-500"></i>
                        心情標籤設定</h2>
                    <p class="text-gray-600 text-sm mb-4">
                        自訂各顏色代表的心情（將顯示於瀏覽日記的選項中，留空即恢復預設）。
                    </p>
                    <div class="space-y-3" id="mood-label-inputs">
                        <div class="flex items-center gap-3">
                            <div class="w-6 h-6 rounded-full shrink-0 shadow-sm" style="background: #ffadad"></div>
                            <input type="text" data-color="#ffadad"
                                class="border p-2 rounded-lg flex-1 focus:ring-2 focus:ring-indigo-300 outline-none"
                                placeholder="例如：紅色 (生氣/熱情)">
                        </div>
                        <div class="flex items-center gap-3">
                            <div class="w-6 h-6 rounded-full shrink-0 shadow-sm" style="background: #ffd6a5"></div>
                            <input type="text" data-color="#ffd6a5"
                                class="border p-2 rounded-lg flex-1 focus:ring-2 focus:ring-indigo-300 outline-none"
                                placeholder="例如：橘色 (開心)">
                        </div>
                        <div class="flex items-center gap-3">
                            <div class="w-6 h-6 rounded-full shrink-0 shadow-sm" style="background: #fdffb6"></div>
                            <input type="text" data-color="#fdffb6"
                                class="border p-2 rounded-lg flex-1 focus:ring-2 focus:ring-indigo-300 outline-none"
                                placeholder="例如：黃色 (平靜)">
                        </div>
                        <div class="flex items-center gap-3">
                            <div class="w-6 h-6 rounded-full shrink-0 shadow-sm" style="background: #caffbf"></div>
                            <input type="text" data-color="#caffbf"
                                class="border p-2 rounded-lg flex-1 focus:ring-2 focus:ring-indigo-300 outline-none"
                                placeholder="例如：綠色 (放鬆)">
                        </div>
                        <div class="flex items-center gap-3">
                            <div class="w-6 h-6 rounded-full shrink-0 shadow-sm" style="background: #9bf6ff"></div>
                            <input type="text" data-color="#9bf6ff"
                                class="border p-2 rounded-lg flex-1 focus:ring-2 focus:ring-indigo-300 outline-none"
                                placeholder="例如：藍色 (憂鬱/冷靜)">
                        </div>
                        <div class="flex items-center gap-3">
                            <div class="w-6 h-6 rounded-full shrink-0 shadow-sm" style="background: #bdb2ff"></div>
                            <input type="text" data-color="#bdb2ff"
                                class="border p-2 rounded-lg flex-1 focus:ring-2 focus:ring-indigo-300 outline-none"
                                placeholder="例如：紫色 (浪漫/神祕)">
                        </div>
                    </div>
                    <button onclick="saveMoodLabels()"
                        class="w-full bg-indigo-600 text-white py-3 mt-4 rounded-lg font-bold shadow hover:bg-indigo-700 transition">
                        儲存心情標籤
                    </button>
                </div>

            </div>
        </section>

    </main>

    <script>
        // --- 設定與初始化 ---
        // 從 localStorage 讀取 API Key，而非硬編碼
        let API_KEY = localStorage.getItem('gemini_api_key') || "";
        let currentMood = "";
        let entries = [];
        const diaryData = JSON.parse(localStorage.getItem('my_diaries') || '{}');

        // 心情標籤設定
        const defaultMoodLabels = {
            "#ffadad": "紅色 (生氣/熱情)",
            "#ffd6a5": "橘色 (開心)",
            "#fdffb6": "黃色 (平靜)",
            "#caffbf": "綠色 (放鬆)",
            "#9bf6ff": "藍色 (憂鬱/冷靜)",
            "#bdb2ff": "紫色 (浪漫/神祕)"
        };
        let userMoodLabels = JSON.parse(localStorage.getItem('mood_labels')) || {};
        for (let key in defaultMoodLabels) {
            if (!userMoodLabels[key]) userMoodLabels[key] = defaultMoodLabels[key];
        }

        // 初始化日期 (Android WebView 可能無法正確解析 valueAsDate，因此改由字串手動指定日期以確保有預設值)
        const initDate = new Date();
        const yyyy = initDate.getFullYear();
        const mm = String(initDate.getMonth() + 1).padStart(2, '0');
        const dd = String(initDate.getDate()).padStart(2, '0');

        document.getElementById('diary-date').value = `${yyyy}-${mm}-${dd}`;
        document.getElementById('filter-month').value = `${yyyy}-${mm}`;

        renderMoodOptions();

        // 心情選擇器邏輯
        document.querySelectorAll('.mood-dot').forEach(dot => {
            dot.addEventListener('click', () => {
                document.querySelectorAll('.mood-dot').forEach(d => d.classList.remove('active'));
                dot.classList.add('active');
                currentMood = dot.dataset.color;
            });
        });

        // --- 切換視圖 ---
        function switchView(view) {
            document.getElementById('view-list').classList.toggle('hidden', view !== 'list');
            document.getElementById('view-write').classList.toggle('hidden', view !== 'write');
            document.getElementById('view-settings').classList.toggle('hidden', view !== 'settings');

            if (view === 'list') renderDiaryList();
            if (view === 'settings') {
                document.getElementById('api-key-input').value = API_KEY;
                // 載入自訂的心情標籤至設定介面中
                document.querySelectorAll('#mood-label-inputs input').forEach(input => {
                    input.value = userMoodLabels[input.dataset.color];
                });
            }
        }

        // --- 心情標籤功能 ---
        function renderMoodOptions() {
            const select = document.getElementById('filter-mood');
            select.innerHTML = '<option value="">所有心情顏色</option>';
            const colors = ['#ffadad', '#ffd6a5', '#fdffb6', '#caffbf', '#9bf6ff', '#bdb2ff'];
            colors.forEach(color => {
                const label = userMoodLabels[color];
                select.innerHTML += `<option value="${color}">${label}</option>`;
            });
            // 更新寫作區的心情圓點提示（hover即可顯示）
            document.querySelectorAll('.mood-dot').forEach(dot => {
                dot.title = userMoodLabels[dot.dataset.color];
            });
        }

        function saveMoodLabels() {
            const inputs = document.querySelectorAll('#mood-label-inputs input');
            inputs.forEach(input => {
                const color = input.dataset.color;
                if (input.value.trim()) {
                    userMoodLabels[color] = input.value.trim();
                } else {
                    userMoodLabels[color] = defaultMoodLabels[color];
                }
            });
            localStorage.setItem('mood_labels', JSON.stringify(userMoodLabels));
            renderMoodOptions();
            alert("心情標籤已儲存！");
            switchView('write');
        }

        // --- AI 功能：Gemini API ---
        async function callGemini(prompt) {
            if (!API_KEY) {
                if (confirm("您尚未設定 Gemini API Key，請先前往設定頁面輸入。是否現在前往？")) {
                    switchView('settings');
                }
                return null;
            }
            // 更新為最新的模型 (gemini-2.5-flash)
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });
                const data = await response.json();

                // 檢查 HTTP 狀態碼是否成功
                if (!response.ok) {
                    console.error("Gemini API 回傳錯誤:", data);
                    const errMsg = data.error?.message || "未知的錯誤。請確認設定中的 API Key 是否有效。";
                    alert(`AI 模型發生錯誤 (HTTP ${response.status}):\n${errMsg}`);
                    return null;
                }

                if (!data.candidates || data.candidates.length === 0) {
                    console.error("Gemini API 未回傳有效的內容:", data);
                    alert("AI 未能產生有效的內容，請稍後再試。");
                    return null;
                }

                return data.candidates[0].content.parts[0].text;
            } catch (err) {
                console.error("Fetch 請求失敗:", err);
                alert("發送請求至 AI 服務失敗，請確認網路連線或檢查 API Key 授權。");
                return null;
            }
        }

        // --- 錄音功能 ---
        function startVoice() {
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'zh-TW';
            const btn = document.getElementById('voice-btn');

            recognition.onstart = () => {
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 聆聽中...';
                btn.classList.replace('bg-red-50', 'bg-red-200');
            };

            recognition.onresult = async (event) => {
                const transcript = event.results[0][0].transcript;
                btn.innerHTML = '<i class="fas fa-robot fa-spin"></i> AI 解析中...';

                const prompt = `請將以下這段口述日記解析為 JSON 格式，包含 "time_point" (時間點) 和 "content" (具體內容)。
                範例輸入：上午上班時因為塞車而遲到，心情不好，還好主管沒生氣。
                範例輸出：{"time_point": "上午上班時", "content": "因為塞車而遲到，心情不好，還好主管沒生氣。"}
                輸入內容：${transcript}`;

                try {
                    const aiResult = await callGemini(prompt);
                    if (aiResult) {
                        const cleanJson = aiResult.replace(/```json|```/g, '');
                        try {
                            const entry = JSON.parse(cleanJson);
                            addEntryToUI(entry.time_point || '剛才', entry.content);
                        } catch (parseErr) {
                            console.error("JSON 解析失敗", parseErr, cleanJson);
                            alert("AI 回傳的格式不正確，無法解析為日誌。");
                        }
                    } else {
                        // AI 請求失敗，已在 callGemini 內 alert，此處不做事
                    }
                } catch (e) {
                    alert("處理過程中發生意外錯誤");
                    console.error(e);
                }
                resetVoiceBtn();
            };

            recognition.onerror = () => resetVoiceBtn();
            recognition.start();
        }

        function resetVoiceBtn() {
            const btn = document.getElementById('voice-btn');
            btn.innerHTML = '<i class="fas fa-microphone"></i> 錄音解析';
        }

        // --- 條目管理 ---
        function addManualEntry() {
            const timeInput = document.getElementById('manual-time');
            const time = timeInput.value.trim() || '';
            const text = document.getElementById('manual-input').value;

            if (!text) return;

            addEntryToUI(time, text);
            document.getElementById('manual-input').value = '';
            timeInput.value = ''; // 記錄完畢後將時間點重置，方便連續輸入
        }

        function addEntryToUI(time, content) {
            entries.push({ time, content });
            renderEntries();
        }

        function renderEntries() {
            const list = document.getElementById('entries-list');
            list.innerHTML = entries.map((e, index) => `
                <div class="bg-gray-50 p-3 sm:p-4 rounded-lg border-l-4 border-indigo-400">
                    <div class="text-xs text-indigo-500 font-bold mb-1">${e.time}</div>
                    <div class="text-gray-700 break-words">${e.content}</div>
                </div>
            `).join('');
        }

        // --- 生成總結 ---
        async function generateSummary() {
            if (entries.length === 0) return alert("請先寫一些小記喔！");
            const btn = event.target;
            btn.innerText = "生成中...";

            const logsText = entries.map(e => `${e.time}: ${e.content}`).join('\n');
            const prompt = `根據以下的小記內容，寫一段溫馨且精簡的當日總結（約50字），並在最後給予一句鼓勵的話：\n${logsText}`;

            const summary = await callGemini(prompt);
            if (summary) {
                document.getElementById('daily-summary').value = summary;
            }
            btn.innerHTML = '<i class="fas fa-magic"></i> AI 自動生成';
        }

        // --- 儲存與讀取 ---
        function saveApiKey() {
            const key = document.getElementById('api-key-input').value.trim();
            if (key) {
                API_KEY = key;
                localStorage.setItem('gemini_api_key', key);
                alert("API Key 解析成功，設定已儲存！");
                switchView('write'); // 儲存後導回寫日記模式
            } else {
                alert("API Key 不能為空");
            }
        }

        function saveDiary() {
            const date = document.getElementById('diary-date').value;
            const summary = document.getElementById('daily-summary').value;

            if (!date) return alert("請選擇日期");

            diaryData[date] = {
                entries: [...entries],
                summary,
                mood: currentMood
            };

            localStorage.setItem('my_diaries', JSON.stringify(diaryData));
            alert("日記已儲存！");
            entries = []; // 清空
            switchView('list');
        }

        function renderDiaryList() {
            const container = document.getElementById('diary-container');
            const filterMonth = document.getElementById('filter-month').value; // YYYY-MM
            const filterMood = document.getElementById('filter-mood').value;

            container.innerHTML = "";

            const sortedDates = Object.keys(diaryData).sort().reverse();

            sortedDates.forEach(date => {
                const data = diaryData[date];

                // 篩選過濾
                if (filterMonth && !date.startsWith(filterMonth)) return;
                if (filterMood && data.mood !== filterMood) return;

                const card = document.createElement('div');
                card.className = "bg-white p-4 rounded-xl shadow-sm border-r-8 cursor-pointer hover:shadow-md transition";
                card.style.borderRightColor = data.mood || '#eee';
                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <h4 class="font-bold text-lg">${date}</h4>
                        <span class="text-xs text-gray-400">${data.entries.length} 則紀錄</span>
                    </div>
                    <p class="text-gray-600 text-sm mt-2 line-clamp-2">${data.summary || '點擊查看詳情...'}</p>
                `;
                card.onclick = () => loadDiaryToEdit(date);
                container.appendChild(card);
            });
        }

        function loadDiaryToEdit(date) {
            const data = diaryData[date];
            document.getElementById('diary-date').value = date;
            entries = [...data.entries];
            document.getElementById('daily-summary').value = data.summary;
            currentMood = data.mood;

            // 更新 UI 狀態
            renderEntries();
            document.querySelectorAll('.mood-dot').forEach(dot => {
                dot.classList.toggle('active', dot.dataset.color === currentMood);
            });
            switchView('write');
        }

        // 監聽過濾器
        document.getElementById('filter-month').addEventListener('change', renderDiaryList);
        document.getElementById('filter-mood').addEventListener('change', renderDiaryList);

    </script>
</body>

</html>
